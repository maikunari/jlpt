<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT Podcast Study</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0f1117;
    --bg2: #161822;
    --bg3: #1e2030;
    --border: #2a2d3e;
    --text: #c8cad8;
    --text-dim: #6b7084;
    --accent: #e94560;
    --accent-dim: #e9456033;
    --vocab: #4cc9f0;
    --vocab-bg: #4cc9f015;
    --grammar: #c77dff;
    --grammar-bg: #c77dff15;
    --collocation: #52b788;
    --collocation-bg: #52b78815;
    --jlpt: #f4a261;
    --success: #52b788;
    --warning: #f4a261;
  }
  
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  
  .container { max-width: 960px; margin: 0 auto; padding: 20px; }
  
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
  }
  header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  
  .anki-status {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }
  .anki-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-dim);
  }
  .anki-dot.connected { background: var(--success); }
  
  /* Due relistens banner */
  .due-banner {
    background: var(--accent-dim); border: 1px solid var(--accent);
    border-radius: 8px; padding: 14px 18px; margin-bottom: 20px;
  }
  .due-banner h3 { font-size: 14px; color: var(--accent); margin-bottom: 8px; }
  .due-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0; font-size: 13px;
  }
  .due-item button {
    background: var(--accent); color: white; border: none;
    padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  
  /* Input form */
  .input-section {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px; margin-bottom: 24px;
  }
  .input-row { display: flex; gap: 10px; }
  .input-row input[type="text"] {
    flex: 1; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .input-row input:focus { border-color: var(--accent); }
  .input-row select {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 10px 12px; border-radius: 6px;
    font-size: 14px; cursor: pointer;
  }
  .btn {
    background: var(--accent); color: white; border: none;
    padding: 10px 20px; border-radius: 6px; cursor: pointer;
    font-weight: 500; font-size: 14px; white-space: nowrap;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-outline {
    background: transparent; border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-sm { padding: 6px 14px; font-size: 13px; }
  
  /* Episode list */
  .episode-list { display: flex; flex-direction: column; gap: 8px; }
  .episode-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 18px; cursor: pointer;
    transition: border-color 0.2s; display: flex; justify-content: space-between;
    align-items: center;
  }
  .episode-card:hover { border-color: var(--accent); }
  .episode-title { font-weight: 500; font-size: 14px; }
  .episode-meta {
    display: flex; gap: 10px; align-items: center;
    font-size: 12px; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }
  .status-badge {
    padding: 2px 8px; border-radius: 4px; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .episode-date { color: var(--text-dim); font-size: 11px; }
  .card-delete-btn {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 16px; padding: 0 2px; line-height: 1;
    opacity: 0; transition: opacity 0.15s;
  }
  .episode-card:hover .card-delete-btn { opacity: 1; }
  .card-delete-btn:hover { color: var(--accent); }
  .edit-title-btn {
    background: none; border: none; cursor: pointer;
    font-size: 14px; opacity: 0.4; padding: 2px;
    transition: opacity 0.2s;
  }
  .edit-title-btn:hover { opacity: 1; }
  .title-edit-input {
    background: var(--bg3); border: 1px solid var(--accent);
    color: var(--text); padding: 4px 10px; border-radius: 6px;
    font-size: 18px; font-weight: 700; font-family: inherit;
    outline: none; min-width: 300px;
  }
  .status-ready { background: #52b78820; color: var(--success); }
  .status-processing { background: #f4a26120; color: var(--warning); }
  .status-error { background: #e9456020; color: var(--accent); }
  
  /* Detail view */
  .detail-view { display: none; }
  .detail-view.active { display: block; }
  .back-btn {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 14px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 4px;
  }
  .back-btn:hover { color: var(--text); }
  
  .detail-header {
    display: flex; justify-content: space-between; align-items: start;
    margin-bottom: 20px;
  }
  .detail-header h2 { font-size: 18px; font-weight: 700; }
  
  .listen-section {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; margin-bottom: 16px;
  }
  .listen-section-top {
    display: flex; align-items: center; justify-content: space-between;
  }
  .listen-count { font-size: 14px; }
  .listen-count strong { color: var(--accent); font-size: 20px; }
  .listen-history { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
  .listen-entry {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; color: var(--text-dim); padding: 4px 0;
    border-top: 1px solid var(--border);
  }
  .listen-undo {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 11px; padding: 2px 6px;
    border-radius: 3px; border: 1px solid var(--border);
  }
  .listen-undo:hover { color: var(--accent); border-color: var(--accent); }
  
  /* Transcript toggle */
  .transcript-section { margin-bottom: 20px; }
  .transcript-toggle {
    background: var(--bg2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 16px; border-radius: 6px;
    cursor: pointer; font-size: 13px; width: 100%;
    text-align: left; display: flex; justify-content: space-between;
  }
  .transcript-content {
    display: none; background: var(--bg2); border: 1px solid var(--border);
    border-top: none; border-radius: 0 0 6px 6px; padding: 16px;
    font-size: 14px; line-height: 1.8; max-height: 400px; overflow-y: auto;
    white-space: pre-wrap;
  }
  .transcript-content.open { display: block; }
  
  /* Extractions table */
  .extractions-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .filter-tabs { display: flex; gap: 4px; }
  .filter-tab {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text-dim); padding: 5px 12px; border-radius: 4px;
    cursor: pointer; font-size: 12px; transition: all 0.2s;
  }
  .filter-tab.active { border-color: var(--accent); color: var(--text); }
  
  .extraction-item {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px; margin-bottom: 8px;
    display: flex; gap: 12px; align-items: start;
  }
  .extraction-item input[type="checkbox"] {
    margin-top: 4px; accent-color: var(--accent);
    width: 16px; height: 16px; cursor: pointer;
  }
  .extraction-body { flex: 1; }
  .extraction-top {
    display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px;
  }
  .ext-japanese { font-size: 20px; font-weight: 700; line-height: 2.2; }
  .ext-japanese ruby { ruby-position: over; }
  .ext-japanese rt { font-size: 11px; font-weight: 400; color: var(--text-dim); }
  .ext-reading { font-size: 14px; color: var(--text-dim); }
  .ext-english { font-size: 15px; margin-bottom: 8px; }
  .ext-context {
    font-size: 14px; color: var(--text-dim); padding: 6px 10px;
    border-left: 2px solid var(--border); margin-bottom: 6px;
  }
  .ext-note { font-size: 13px; color: var(--text-dim); font-style: italic; }
  .ext-tags { display: flex; gap: 4px; margin-top: 8px; }
  .ext-tag {
    padding: 2px 7px; border-radius: 3px; font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .ext-tag-vocab { background: var(--vocab-bg); color: var(--vocab); }
  .ext-tag-grammar { background: var(--grammar-bg); color: var(--grammar); }
  .ext-tag-collocation { background: var(--collocation-bg); color: var(--collocation); }
  .ext-tag-jlpt { background: #f4a26115; color: var(--jlpt); }
  .extraction-search {
    width: 100%; margin: 10px 0 4px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 8px 12px; border-radius: 6px;
    font-size: 13px; font-family: 'JetBrains Mono', monospace; outline: none;
    transition: border-color 0.2s;
  }
  .extraction-search:focus { border-color: var(--accent); }
  .ext-anki-pushed { border-left: 3px solid var(--success); }
  .ext-delete {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 16px; padding: 2px 6px;
  }
  .ext-delete:hover { color: var(--accent); }
  
  .actions-bar {
    display: flex; gap: 10px; margin-top: 16px;
    padding-top: 16px; border-top: 1px solid var(--border);
  }
  
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--bg3); border: 1px solid var(--border);
    padding: 12px 20px; border-radius: 8px; font-size: 14px;
    opacity: 0; transition: opacity 0.3s; z-index: 100;
  }
  .toast.show { opacity: 1; }
  
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--text-dim);
  }
  .empty-state p { font-size: 14px; }
  
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  @media (max-width: 640px) {
    .input-row { flex-direction: column; }
    .container { padding: 14px; }
    .detail-header { flex-direction: column; gap: 10px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🎧 JLPT <span>Podcast Study</span></h1>
    <div class="anki-status">
      <div class="anki-dot" id="ankiDot"></div>
      <span id="ankiLabel">checking anki...</span>
    </div>
  </header>

  <!-- Due relistens -->
  <div class="due-banner" id="dueBanner" style="display:none">
    <h3>🔁 Due for re-listen</h3>
    <div id="dueList"></div>
  </div>

  <!-- Main list view -->
  <div id="listView">
    <div class="input-section">
      <div class="input-row">
        <input type="text" id="urlInput" placeholder="Paste podcast or YouTube URL..." />
        <select id="levelSelect">
          <option value="N3" selected>N3</option>
          <option value="N2">N2</option>
          <option value="N1">N1</option>
          <option value="N4">N4</option>
        </select>
        <button class="btn" id="submitBtn" onclick="submitEpisode()">Process</button>
      </div>
    </div>
    <div class="episode-list" id="episodeList">
      <div class="empty-state"><p>No episodes yet. Paste a URL above to get started.</p></div>
    </div>
  </div>

  <!-- Detail view -->
  <div class="detail-view" id="detailView">
    <button class="back-btn" onclick="showList()">← Back to episodes</button>
    <div class="detail-header">
      <div>
        <div style="display:flex;align-items:center;gap:8px">
          <h2 id="detailTitle"></h2>
          <button class="edit-title-btn" onclick="startEditTitle()" title="Rename">✏️</button>
        </div>
        <div class="episode-meta" id="detailMeta"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-sm" id="retryBtn" style="display:none" onclick="retryEpisode(currentEpisodeId)">↺ Retry</button>
        <button class="btn btn-outline btn-sm" style="color:var(--accent);border-color:var(--accent)" onclick="deleteEpisode()">Delete episode</button>
      </div>
    </div>

    <div class="listen-section">
      <div class="listen-section-top">
        <div class="listen-count">
          Listens: <strong id="listenCount">0</strong>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm" onclick="markListen()">🎧 Mark listened</button>
        </div>
      </div>
      <div class="listen-history" id="listenHistory"></div>
    </div>

    <div class="transcript-section">
      <button class="transcript-toggle" onclick="toggleTranscript()">
        <span>📝 Transcript</span><span id="transcriptArrow">▸</span>
      </button>
      <div class="transcript-content" id="transcriptContent"></div>
    </div>

    <div class="extractions-header">
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterExtractions('all', this)">All</button>
        <button class="filter-tab" onclick="filterExtractions('vocab', this)">Vocab</button>
        <button class="filter-tab" onclick="filterExtractions('grammar', this)">Grammar</button>
        <button class="filter-tab" onclick="filterExtractions('collocation', this)">Collocations</button>
      </div>
      <label style="font-size:12px;color:var(--text-dim)">
        <input type="checkbox" id="selectAll" onchange="toggleSelectAll()" style="accent-color:var(--accent)"> Select all
      </label>
    </div>
    <input type="search" id="extractionSearch" class="extraction-search" placeholder="Search Japanese or English…" oninput="searchExtractions(this.value)">

    <div id="extractionsList"></div>

    <div class="actions-bar">
      <button class="btn" onclick="pushSelected()">Push selected to Anki</button>
      <button class="btn btn-outline" id="pushAllBtn" onclick="pushAll()">Push all to Anki</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentEpisodeId = null;
let currentEpisodeStatus = '';
let currentExtractions = [];
let currentFilter = 'all';
let currentSearch = '';
let episodes = [];

// --- Init ---
async function init() {
  checkAnki();
  loadEpisodes();
  loadDueRelistens();
  // Poll for status updates
  setInterval(loadEpisodes, 5000);
  setInterval(pollCurrentEpisode, 3000);
  setInterval(loadDueRelistens, 30000);
  setInterval(checkAnki, 30000);
}

// --- Detail view polling ---
async function pollCurrentEpisode() {
  if (currentEpisodeId === null) return;
  // No need to poll if already in a terminal state
  if (currentEpisodeStatus === 'ready' || currentEpisodeStatus.startsWith('error')) return;
  try {
    const r = await fetch(`/api/episodes/${currentEpisodeId}`);
    if (!r.ok) return;
    const ep = await r.json();
    const wasProcessing = currentEpisodeStatus !== 'ready' && !currentEpisodeStatus.startsWith('error');
    const nowTerminal = ep.status === 'ready' || ep.status.startsWith('error');
    // Always update the status line so user sees downloading → transcribing → extracting
    document.getElementById('detailMeta').textContent = `${ep.jlpt_level} · ${ep.status}`;
    document.getElementById('retryBtn').style.display = ep.status.startsWith('error') ? '' : 'none';
    currentEpisodeStatus = ep.status;
    // Full refresh when we reach a terminal state to load extractions/transcript
    if (wasProcessing && nowTerminal) openEpisode(currentEpisodeId);
  } catch {}
}

// --- Anki status ---
async function checkAnki() {
  try {
    const r = await fetch('/api/anki/status');
    const d = await r.json();
    document.getElementById('ankiDot').classList.toggle('connected', d.connected);
    document.getElementById('ankiLabel').textContent = d.connected ? 'anki connected' : 'anki offline';
  } catch { 
    document.getElementById('ankiLabel').textContent = 'anki offline';
  }
}

// --- Due relistens ---
async function loadDueRelistens() {
  try {
    const r = await fetch('/api/relistens/due');
    const items = await r.json();
    const banner = document.getElementById('dueBanner');
    if (items.length === 0) { banner.style.display = 'none'; return; }
    banner.style.display = 'block';
    document.getElementById('dueList').innerHTML = items.map(i => `
      <div class="due-item">
        <span>${i.title || 'Episode'} <span style="color:var(--text-dim)">(${i.interval_days}d interval)</span></span>
        <div style="display:flex;gap:6px">
          <button onclick="event.stopPropagation();completeRelisten(${i.id},${i.episode_id})">✓ Done</button>
        </div>
      </div>
    `).join('');
  } catch (e) { toast('Error loading re-listens: ' + e.message); }
}

async function completeRelisten(scheduleId, episodeId) {
  try {
    await fetch(`/api/relistens/${scheduleId}/complete`, { method: 'POST' });
    await fetch(`/api/episodes/${episodeId}/listen`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
    loadDueRelistens();
    toast('Re-listen completed! Next one scheduled.');
  } catch (e) { toast('Error: ' + e.message); }
}

// --- Episodes ---
async function loadEpisodes() {
  if (currentEpisodeId !== null) return;
  try {
    const r = await fetch('/api/episodes');
    if (!r.ok) { toast('Failed to load episodes'); return; }
    episodes = await r.json();
    const list = document.getElementById('episodeList');
    if (episodes.length === 0) {
      list.innerHTML = '<div class="empty-state"><p>No episodes yet. Paste a URL above to get started.</p></div>';
      return;
    }
    list.innerHTML = episodes.map(ep => {
      const statusClass = ep.status === 'ready' ? 'status-ready' :
                          ep.status.startsWith('error') ? 'status-error' : 'status-processing';
      const statusLabel = ep.status === 'ready' ? 'ready' :
                          ep.status.startsWith('error') ? 'error' : ep.status;
      const date = ep.created_at ? ep.created_at.slice(0, 10) : '';
      return `
        <div class="episode-card" onclick="openEpisode(${ep.id})">
          <span class="episode-title">${ep.title || ep.url}</span>
          <div class="episode-meta">
            <span>${ep.jlpt_level}</span>
            ${date ? `<span class="episode-date">${date}</span>` : ''}
            <span class="status-badge ${statusClass}">
              ${statusLabel === ep.status && !['ready','error'].includes(ep.status) ? '<span class="spinner"></span> ' : ''}${statusLabel}
            </span>
            ${ep.status.startsWith('error') ? `<button class="btn btn-sm" style="padding:2px 8px;font-size:11px" onclick="event.stopPropagation();retryEpisode(${ep.id})">↺ Retry</button>` : ''}
            <button class="card-delete-btn" onclick="event.stopPropagation();deleteEpisodeFromList(${ep.id})" title="Delete episode">×</button>
          </div>
        </div>
      `;
    }).join('');
  } catch (e) { toast('Error loading episodes: ' + e.message); }
}

async function submitEpisode() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;
  if (episodes.find(e => e.url === url)) { toast('This URL has already been added'); return; }
  const level = document.getElementById('levelSelect').value;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  try {
    const r = await fetch('/api/episodes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, jlpt_level: level }),
    });
    if (!r.ok) { const e = await r.json(); toast(e.detail || 'Error submitting URL'); return; }
    document.getElementById('urlInput').value = '';
    toast('Processing started! This may take a few minutes.');
    loadEpisodes();
  } catch (e) { toast('Error: ' + e.message); }
  btn.disabled = false;
}

// --- Detail view ---
async function openEpisode(id) {
  currentEpisodeId = id;
  try {
    const r = await fetch(`/api/episodes/${id}`);
    if (!r.ok) { toast('Failed to load episode'); currentEpisodeId = null; return; }
    const ep = await r.json();

    currentEpisodeStatus = ep.status;
    document.getElementById('detailTitle').textContent = ep.title || 'Episode';
    document.getElementById('detailMeta').textContent = `${ep.jlpt_level} · ${ep.status}`;
    const listens = ep.listens || [];
    document.getElementById('listenCount').textContent = listens.length;
    document.getElementById('listenHistory').innerHTML = listens.map(l => `
      <div class="listen-entry">
        <span>Listen #${l.listen_number} — ${l.listened_at ? l.listened_at.slice(0,10) : ''}</span>
        <button class="listen-undo" onclick="deleteListenEntry(${l.id})">↩ Undo</button>
      </div>
    `).join('');
    document.getElementById('retryBtn').style.display = ep.status.startsWith('error') ? '' : 'none';
    document.getElementById('transcriptContent').textContent = ep.transcript || 'No transcript yet.';

    currentExtractions = ep.extractions || [];
    currentSearch = '';
    currentFilter = 'all';
    document.getElementById('extractionSearch').value = '';
    document.querySelectorAll('.filter-tab').forEach((t, i) => t.classList.toggle('active', i === 0));
    renderExtractions();

    document.getElementById('listView').style.display = 'none';
    document.getElementById('detailView').classList.add('active');
  } catch (e) {
    toast('Could not load episode: ' + e.message);
    currentEpisodeId = null;
  }
}

function showList() {
  document.getElementById('listView').style.display = 'block';
  document.getElementById('detailView').classList.remove('active');
  currentEpisodeId = null;
  currentEpisodeStatus = '';
  currentSearch = '';
  currentFilter = 'all';
  loadEpisodes();
}

async function deleteEpisodeFromList(id) {
  if (!confirm('Delete this episode and all its extractions?')) return;
  try {
    const r = await fetch(`/api/episodes/${id}`, { method: 'DELETE' });
    if (!r.ok) { toast('Failed to delete episode'); return; }
    toast('Episode deleted.');
    loadEpisodes();
  } catch (e) { toast('Error: ' + e.message); }
}

function startEditTitle() {
  const h2 = document.getElementById('detailTitle');
  const current = h2.textContent;
  const btn = document.querySelector('.edit-title-btn');
  btn.style.display = 'none';
  const input = document.createElement('input');
  input.className = 'title-edit-input';
  input.value = current;
  h2.replaceWith(input);
  input.focus();
  input.select();
  const save = async () => {
    const newTitle = input.value.trim();
    if (!newTitle || newTitle === current) { cancelEdit(); return; }
    try {
      const r = await fetch(`/api/episodes/${currentEpisodeId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: newTitle }),
      });
      if (!r.ok) { toast('Failed to rename'); cancelEdit(); return; }
      const newH2 = document.createElement('h2');
      newH2.id = 'detailTitle';
      newH2.textContent = newTitle;
      input.replaceWith(newH2);
      btn.style.display = '';
      // Update in local episodes array too
      const ep = episodes.find(e => e.id === currentEpisodeId);
      if (ep) ep.title = newTitle;
      toast('Renamed.');
    } catch (e) { toast('Error: ' + e.message); cancelEdit(); }
  };
  const cancelEdit = () => {
    const newH2 = document.createElement('h2');
    newH2.id = 'detailTitle';
    newH2.textContent = current;
    input.replaceWith(newH2);
    btn.style.display = '';
  };
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') save();
    if (e.key === 'Escape') cancelEdit();
  });
  input.addEventListener('blur', save);
}

async function retryEpisode(id) {
  try {
    const r = await fetch(`/api/episodes/${id}/retry`, { method: 'POST' });
    if (!r.ok) { const e = await r.json(); toast(e.detail || 'Retry failed'); return; }
    toast('Retrying… check back in a minute.');
    openEpisode(id);
  } catch (e) { toast('Error: ' + e.message); }
}

async function deleteEpisode() {
  if (!confirm('Delete this episode and all its extractions?')) return;
  try {
    const r = await fetch(`/api/episodes/${currentEpisodeId}`, { method: 'DELETE' });
    if (!r.ok) { toast('Failed to delete episode'); return; }
    toast('Episode deleted.');
    showList();
  } catch (e) { toast('Error: ' + e.message); }
}

function toggleTranscript() {
  const c = document.getElementById('transcriptContent');
  c.classList.toggle('open');
  document.getElementById('transcriptArrow').textContent = c.classList.contains('open') ? '▾' : '▸';
}

// --- Extractions ---
function renderExtractions() {
  let filtered = currentFilter === 'all' ? currentExtractions :
                 currentExtractions.filter(e => e.type === currentFilter);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(e =>
      e.japanese.toLowerCase().includes(q) ||
      e.english.toLowerCase().includes(q) ||
      (e.reading && e.reading.toLowerCase().includes(q))
    );
  }
  const unpushedCount = currentExtractions.filter(e => !e.anki_note_id).length;
  const pushAllBtn = document.getElementById('pushAllBtn');
  pushAllBtn.textContent = `Push all to Anki (${unpushedCount})`;
  pushAllBtn.disabled = unpushedCount === 0;

  const list = document.getElementById('extractionsList');

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><p>No extractions yet.</p></div>';
    return;
  }

  list.innerHTML = filtered.map(ext => {
    const pushed = ext.anki_note_id ? 'ext-anki-pushed' : '';
    return `
      <div class="extraction-item ${pushed}" data-id="${ext.id}" data-type="${ext.type}">
        <input type="checkbox" class="ext-check" data-id="${ext.id}" ${ext.anki_note_id ? 'disabled' : ''}>
        <div class="extraction-body">
          <div class="extraction-top">
            <span class="ext-japanese">${ext.reading && ext.reading.includes('{') ? toRuby(ext.reading) : ext.japanese}</span>
            ${ext.reading && !ext.reading.includes('{') ? `<span class="ext-reading">${ext.reading}</span>` : ''}
          </div>
          <div class="ext-english">${ext.english}</div>
          ${ext.context_sentence ? `<div class="ext-context">${ext.context_sentence}</div>` : ''}
          ${ext.usage_note ? `<div class="ext-note">💡 ${ext.usage_note}</div>` : ''}
          <div class="ext-tags">
            <span class="ext-tag ext-tag-${ext.type}">${ext.type}</span>
            ${ext.jlpt_tag ? `<span class="ext-tag ext-tag-jlpt">${ext.jlpt_tag}</span>` : ''}
            ${ext.anki_note_id ? '<span class="ext-tag" style="background:#52b78820;color:var(--success)">in anki</span>' : ''}
          </div>
        </div>
        <button class="ext-delete" onclick="deleteExtraction(${ext.id})" title="Remove">×</button>
      </div>
    `;
  }).join('');
}

function filterExtractions(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('selectAll').checked = false;
  renderExtractions();
}

function toRuby(text) {
  if (!text) return '';
  // Convert 漢字{かんじ} notation → <ruby>漢字<rt>かんじ</rt></ruby>
  return text.replace(/([^{}\n]+)\{([^}]+)\}/g, '<ruby>$1<rt>$2</rt></ruby>');
}

function searchExtractions(value) {
  currentSearch = value;
  document.getElementById('selectAll').checked = false;
  renderExtractions();
}

function toggleSelectAll() {
  const checked = document.getElementById('selectAll').checked;
  document.querySelectorAll('.ext-check:not(:disabled)').forEach(c => c.checked = checked);
}

async function deleteExtraction(id) {
  try {
    const r = await fetch(`/api/extractions/${id}`, { method: 'DELETE' });
    if (!r.ok) { toast('Failed to delete extraction'); return; }
    currentExtractions = currentExtractions.filter(e => e.id !== id);
    renderExtractions();
  } catch (e) { toast('Error: ' + e.message); }
}

// --- Anki push ---
async function pushSelected() {
  const ids = [...document.querySelectorAll('.ext-check:checked')].map(c => parseInt(c.dataset.id));
  if (ids.length === 0) { toast('Select some items first'); return; }
  try {
    const r = await fetch(`/api/episodes/${currentEpisodeId}/push-to-anki`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ extraction_ids: ids }),
    });
    if (!r.ok) { const e = await r.json(); toast(e.detail); return; }
    const d = await r.json();
    toast(`Pushed ${d.pushed} cards to Anki${d.duplicates ? ` (${d.duplicates} duplicates skipped)` : ''}`);
    openEpisode(currentEpisodeId);
  } catch (e) { toast('Error: ' + e.message); }
}

async function pushAll() {
  try {
    const r = await fetch(`/api/episodes/${currentEpisodeId}/push-all-to-anki`, { method: 'POST' });
    if (!r.ok) { const e = await r.json(); toast(e.detail); return; }
    const d = await r.json();
    toast(`Pushed ${d.pushed} cards to Anki${d.duplicates ? ` (${d.duplicates} duplicates skipped)` : ''}`);
    openEpisode(currentEpisodeId);
  } catch (e) { toast('Error: ' + e.message); }
}

async function deleteListenEntry(listenId) {
  try {
    const r = await fetch(`/api/episodes/${currentEpisodeId}/listens/${listenId}`, { method: 'DELETE' });
    if (!r.ok) { toast('Failed to remove listen'); return; }
    toast('Listen removed.');
    openEpisode(currentEpisodeId);
  } catch (e) { toast('Error: ' + e.message); }
}

// --- Listen tracking ---
async function markListen() {
  const btn = document.querySelector('.listen-section .btn');
  btn.disabled = true;
  try {
    const r = await fetch(`/api/episodes/${currentEpisodeId}/listen`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}',
    });
    if (!r.ok) { toast('Failed to record listen'); return; }
    toast('Listen recorded! Re-listen scheduled.');
    openEpisode(currentEpisodeId);
  } catch (e) { toast('Error: ' + e.message); }
  finally { btn.disabled = false; }
}

// --- Toast ---
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// --- URL params ---
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitEpisode();
});

init();
</script>
</body>
</html>
